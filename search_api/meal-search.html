<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="style.css">
        <title>Meal Search</title>
    </head>

    <header>
        <h1>Search for Delicous Meals</h1>
    </header>

    <main>

        <h2>Search for a meal in the searchbar (chicken, lamb, fish, etc)</h2>

        <form action="">

            <div id="search">
                <input type="text" placeholder="Search" id="searchInput"></input>
                <button id="searchBtn">Submit</button>
            </div>

            <p id="status">Ready to search</p>
            <div id="results"></div>

        </form>

        
        <script src="meal-search.js"></script>

    </main>

</html>
