<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>To-Do List</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <h1>To-Do List</h1>

  <form id="taskForm">
    <input type="text" id="taskInput" placeholder="Task name" />
    <input type="text" id="tagInput" placeholder="Tag (optional)" />
    <button type="submit">Add</button>
    <div class="error" id="error"></div>
  </form>

  <p id="counter"></p>

  <div class="filters">
    <button data-filter="all" class="active">All</button>
    <button data-filter="active">Active</button>
    <button data-filter="completed">Completed</button>
  </div>

  <div>
    <label>Filter by tag:</label>
    <select id="tagFilter">
      <option value="all">All</option>
    </select>
  </div>

  <div id="taskList"></div>

  <script>
    let tasks = JSON.parse(localStorage.getItem("tasks")) || [];
    let currentFilter = "all";
    let currentTag = "all";

    const taskForm = document.getElementById("taskForm");
    const taskInput = document.getElementById("taskInput");
    const tagInput = document.getElementById("tagInput");
    const taskList = document.getElementById("taskList");
    const errorDiv = document.getElementById("error");
    const counter = document.getElementById("counter");
    const tagFilter = document.getElementById("tagFilter");

    function saveTasks() {
      localStorage.setItem("tasks", JSON.stringify(tasks));
    }

    function renderTags() {
      const tags = [...new Set(tasks.map(t => t.tag).filter(Boolean))];
      tagFilter.innerHTML = `<option value="all">All</option>`;
      tags.forEach(tag => {
        const option = document.createElement("option");
        option.value = tag;
        option.textContent = tag;
        tagFilter.appendChild(option);
      });
    }

    function renderTasks() {
      taskList.innerHTML = "";

      let filtered = tasks.filter(task => {
        if (currentFilter === "active") return !task.done;
        if (currentFilter === "completed") return task.done;
        return true;
      });

      if (currentTag !== "all") {
        filtered = filtered.filter(t => t.tag === currentTag);
      }

      filtered.forEach(task => {
        const div = document.createElement("div");
        div.className = "task";

        const left = document.createElement("div");
        left.className = task.done ? "completed" : "";
        left.innerHTML = `
          <span>${task.text}</span>
          ${task.tag ? `<span class="tag">${task.tag}</span>` : ""}
        `;

        const actions = document.createElement("div");

        const toggleBtn = document.createElement("button");
        toggleBtn.textContent = "✓";
        toggleBtn.onclick = () => {
          task.done = !task.done;
          saveTasks();
          renderTasks();
        };

        const deleteBtn = document.createElement("button");
        deleteBtn.textContent = "✕";
        deleteBtn.onclick = () => {
          tasks = tasks.filter(t => t.id !== task.id);
          saveTasks();
          renderTasks();
          renderTags();
        };

        actions.appendChild(toggleBtn);
        actions.appendChild(deleteBtn);

        div.appendChild(left);
        div.appendChild(actions);
        taskList.appendChild(div);
      });

      const activeCount = tasks.filter(t => !t.done).length;
      counter.textContent = `${activeCount} active task${activeCount !== 1 ? "s" : ""}`;
    }

    taskForm.addEventListener("submit", e => {
      e.preventDefault();

      const text = taskInput.value.trim();
      const tag = tagInput.value.trim();

      if (!text) {
        errorDiv.textContent = "Must input Task name";
        return;
      }

      errorDiv.textContent = "";

      const newTask = {
        id: Date.now(),
        text,
        tag,
        done: false
      };

      tasks.push(newTask);
      saveTasks();

      taskInput.value = "";
      tagInput.value = "";

      renderTasks();
      renderTags();
    });

    document.querySelectorAll(".filters button").forEach(btn => {
      btn.addEventListener("click", () => {
        document.querySelectorAll(".filters button").forEach(b => b.classList.remove("active"));
        btn.classList.add("active");
        currentFilter = btn.dataset.filter;
        renderTasks();
      });
    });

    tagFilter.addEventListener("change", () => {
      currentTag = tagFilter.value;
      renderTasks();
    });

    renderTags();
    renderTasks();
  </script>

</body>
</html>
